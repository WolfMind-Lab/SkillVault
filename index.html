<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Formazione</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🏛️ Ecosistema Educativo & Professionale</h1>
</header>

<div class="container">

  <!-- IDENTITÀ -->
  <section class="card">
    <h2>🧭 Profilo</h2>

    <input id="userName" placeholder="Nome e cognome">
    <input id="userGoal" placeholder="Obiettivo professionale">

    <button onclick="saveProfile()">Salva profilo</button>

    <div id="profile"></div>
  </section>

  <!-- PERCORSI -->
  <section class="card">
    <h2>🎓 Percorsi educativi</h2>

    <input id="pathName" placeholder="Nome percorso">

    <select id="educationType">
      <option>Scuola</option>
      <option>Università</option>
      <option>Master</option>
      <option>Corso professionale</option>
      <option>Autoformazione</option>
    </select>

    <button onclick="addPath()">Aggiungi percorso</button>

    <div id="paths"></div>
  </section>

  <!-- CORSI -->
  <section class="card">
    <h2>📚 Corsi</h2>

    <select id="pathSelect"></select>

    <input id="courseName" placeholder="Nome corso">
    <input id="totalHours" type="number" placeholder="Ore totali">
    <input id="tolerance" type="number" placeholder="Tolleranza %">

    <button onclick="addCourse()">Aggiungi corso</button>
  </section>

  <!-- REGISTRO -->
  <section class="card">
    <h2>📅 Registro presenze</h2>

    <select id="courseSelect"></select>
    <input id="hours" type="number" placeholder="Ore">

    <button onclick="addLog('present')">✔ Presenza</button>
    <button onclick="addLog('absent')">❌ Assenza</button>
  </section>

  <!-- CALENDARIO -->
  <section class="card">
    <h2>📆 Calendario formazione</h2>

    <input id="eventText" placeholder="Es: Lezione 09:00 - Informatica">

    <button onclick="addEvent()">Aggiungi evento</button>

    <div id="calendar"></div>
  </section>

  <!-- CV AUTOMATICO -->
  <section class="card">
    <h2>📄 CV automatico</h2>

    <button onclick="generateCV()">Genera CV</button>

    <div id="cv"></div>
  </section>

  <!-- PORTFOLIO -->
  <section class="card">
    <h2>💼 Portfolio professionale</h2>
    <div id="portfolio"></div>
  </section>

  <!-- OUTPUT SISTEMA -->
  <section class="card">
    <h2>📊 Sistema educativo</h2>
    <div id="paths"></div>
    <div id="courses"></div>
    <div id="logs"></div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
