<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillVault Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>📊 SkillVault Pro</h1>
  <p>Gestionale formazione personale</p>
</header>

<div class="container">

  <!-- CORSO -->
  <section class="card">
    <h2>🎓 Nuovo corso</h2>

    <input id="name" placeholder="Nome corso">
    <input id="total" type="number" placeholder="Ore totali">
    <input id="done" type="number" placeholder="Ore frequentate">
    <input id="absenceLimit" type="number" placeholder="Ore assenza massime">

    <button onclick="addCourse()">Salva corso</button>
  </section>

  <!-- LISTA -->
  <section class="card">
    <h2>📚 I tuoi corsi</h2>
    <div id="list"></div>
  </section>

  <!-- DOCUMENTI -->
  <section class="card">
    <h2>📄 Documenti</h2>

    <input type="file" id="file">
    <button onclick="addFile()">Carica documento</button>

    <div id="files"></div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
