<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillVault Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🏫 SkillVault Pro</h1>
  <p>Portale formazione e registro presenze</p>
</header>

<div class="container">

  <!-- CORSO -->
  <section class="card">
    <h2>🎓 Crea corso</h2>

    <input id="courseName" placeholder="Nome corso">
    <input id="totalHours" type="number" placeholder="Ore totali">

    <button onclick="addCourse()">Crea corso</button>
  </section>

  <!-- REGISTRO PRESENZE -->
  <section class="card">
    <h2>📅 Registro presenze (oggi)</h2>

    <select id="courseSelect"></select>

    <input id="lessonHours" type="number" placeholder="Ore lezione oggi">

    <button onclick="markPresent()">✔ Segna presenza</button>
    <button onclick="markAbsent()">❌ Segna assenza</button>
  </section>

  <!-- CALENDARIO -->
  <section class="card">
    <h2>📆 Calendario attività</h2>

    <input id="eventText" placeholder="Es: Lezione informatica 09:00-13:00">
    <button onclick="addEvent()">Aggiungi evento</button>

    <div id="calendar"></div>
  </section>

  <!-- CORSI -->
  <section class="card">
    <h2>📊 Stato corsi</h2>
    <div id="courses"></div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
