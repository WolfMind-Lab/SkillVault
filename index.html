<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillVault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>📚 SkillVault</h2>

        <button onclick="showSection('dashboard')">📊 Dashboard</button>
        <button onclick="showSection('courses')">🎓 Corsi</button>
        <button onclick="showSection('calendar')">📅 Calendario</button>
        <button onclick="showSection('docs')">📄 Documenti</button>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- DASHBOARD -->
        <section id="dashboard" class="section active">
            <h1>Dashboard</h1>
            <div id="stats"></div>
        </section>

        <!-- CORSI -->
        <section id="courses" class="section">
            <h1>Corsi</h1>

            <div class="card">
                <input id="courseName" placeholder="Nome corso">
                <input id="hoursTotal" type="number" placeholder="Ore totali">
                <input id="hoursDone" type="number" placeholder="Ore frequentate">
                <button onclick="addCourse()">Aggiungi corso</button>
            </div>

            <div id="courseList"></div>
        </section>

        <!-- CALENDARIO -->
        <section id="calendar" class="section">
            <h1>Calendario</h1>

            <div class="card">
                <input id="eventText" placeholder="Evento (es: corso 09-13)">
                <button onclick="addEvent()">Aggiungi evento</button>
            </div>

            <div id="eventList"></div>
        </section>

        <!-- DOCUMENTI -->
        <section id="docs" class="section">
            <h1>Documenti</h1>

            <div class="card">
                <input type="file" id="fileInput">
                <button onclick="uploadFile()">Carica documento</button>
            </div>

            <div id="fileList"></div>
        </section>

    </main>

</div>

<script src="app.js"></script>
</body>
</html>
