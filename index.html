<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Formazione</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🏫 Ecosistema Educativo</h1>
</header>

<div class="container">

  <!-- IDENTITÀ -->
  <section class="card">
    <h2>🧭 Identità</h2>

    <input id="userName" placeholder="Nome">
    <input id="userGoal" placeholder="Obiettivo">

    <button onclick="saveProfile()">Salva profilo</button>

    <div id="profile"></div>
  </section>

  <!-- PERCORSI -->
  <section class="card">
    <h2>🎓 Percorso educativo</h2>

    <input id="pathName" placeholder="Nome percorso">

    <select id="educationType">
      <option>Scuola</option>
      <option>Università</option>
      <option>Master</option>
      <option>Corso</option>
      <option>Altro</option>
    </select>

    <button onclick="addPath()">Crea percorso</button>

    <div id="paths"></div>
  </section>

  <!-- CORSI -->
  <section class="card">
    <h2>📚 Corsi</h2>

    <select id="pathSelect"></select>

    <input id="courseName" placeholder="Nome corso">
    <input id="totalHours" type="number" placeholder="Ore totali">
    <input id="tolerance" type="number" placeholder="Tolleranza %">

    <button onclick="addCourse()">Aggiungi corso</button>
  </section>

  <!-- REGISTRO -->
  <section class="card">
    <h2>📅 Registro</h2>

    <select id="courseSelect"></select>
    <input id="hours" type="number" placeholder="Ore">

    <button onclick="addLog('present')">✔ Presenza</button>
    <button onclick="addLog('absent')">❌ Assenza</button>
  </section>

  <!-- OUTPUT -->
  <section class="card">
    <h2>📊 Corsi</h2>
    <div id="courses"></div>
  </section>

  <section class="card">
    <h2>🧾 Log</h2>
    <div id="logs"></div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
